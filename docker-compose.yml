version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: zamzam-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zamzam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zamzam_secret}
      POSTGRES_DB: ${POSTGRES_DB:-zamzam_research}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zamzam}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zamzam-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
